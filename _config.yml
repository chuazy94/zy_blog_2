title: DataManiac
tagline: "A dump/blog for my thoughts on anything data"
description: "A blog by Zhi Yuan Chua covering data analytics, football analytics, and more."
url: "https://chuazy94.github.io"
baseurl: "/zy_blog_2"

remote_theme: mmistakes/minimal-mistakes@4.26.2

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty
paginate: 5
paginate_path: /page:num/
excerpt_separator: "<!--more-->"

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-gist
  - jekyll-remote-theme

# Author
author:
  name: "Zhi Yuan Chua"
  bio: "Data analyst with a passion for football analytics and drone videography."
  location: "Singapore"
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/chuazyyy"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/chuazy94"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/zhiyuanchua"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:zhiyuanchua2806@gmail.com"

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true

# Site footer
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/chuazyyy"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/chuazy94"
